<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>The Lost Beacon - Password Reset</title>
<script src="https://download.playfab.com/PlayFabClientApi.js"></script>

<style>
body { font-family: 'Segoe UI', Arial; text-align: center; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
.card { background: #1e293b; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #334155; max-width: 350px; width: 90%; }
h2 { color: #f59e0b; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
input { padding: 12px; margin: 10px 0; width: 100%; box-sizing: border-box; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; font-size: 16px; }
button { padding: 14px; width: 100%; background: #22c55e; border: none; color: white; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 10px; transition: 0.3s; }
button:hover { background: #16a34a; }
#message { margin-top: 20px; font-weight: bold; font-size: 14px; }
</style>
</head>

<body>

<div class="card">
    <h2>The Lost Beacon</h2>
    <p style="font-size: 14px; color: #94a3b8;">Réinitialisation de mot de passe</p>

    <input type="password" id="newPassword" placeholder="Nouveau mot de passe"><br>
    <input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe"><br>

    <button onclick="resetPassword()">CHANGER LE MOT DE PASSE</button>

    <div id="message"></div>
</div>

<script>
// CONFIGURATION
PlayFab.settings.titleId = "104EA2";

function resetPassword() {
    // 1. Lire le token dans l'URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    
    const password = document.getElementById("newPassword").value;
    const confirm = document.getElementById("confirmPassword").value;
    const msgEl = document.getElementById("message");

    if (!token) {
        showMessage("❌ Erreur : Lien invalide ou expiré.", true);
        return;
    }

    if (password.length < 6) {
        showMessage("❌ Trop court (min. 6 caractères).", true);
        return;
    }

    if (password !== confirm) {
        showMessage("❌ Les mots de passe ne correspondent pas.", true);
        return;
    }

    showMessage("⏳ Connexion aux serveurs...", false);

    // 2. Appel API correct (ResetPassword)
    PlayFabClientAPI.ResetPassword({
        Token: token,
        Password: password,
        TitleId: PlayFab.settings.titleId
    },
    function(result, error) {
        if (result) {
            showMessage("✅ Mot de passe modifié ! Retournez au jeu.");
            // Optionnel : masquer le formulaire après succès
            document.querySelector('button').style.display = 'none';
        } else {
            showMessage("❌ Erreur : " + error.errorMessage, true);
        }
    });
}

function showMessage(msg, isError = false) {
    const el = document.getElementById("message");
    el.innerText = msg;
    el.style.color = isError ? "#f87171" : "#4ade80";
}
</script>

</body>
</html>
