<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lost Beacon - Reset</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 40px; border-radius: 15px; border: 1px solid #ffaa00; max-width: 350px; width: 90%; text-align: center; }
        h2 { color: #ffaa00; text-transform: uppercase; margin-top: 0; }
        input { padding: 12px; margin: 10px 0; width: 100%; box-sizing: border-box; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 16px; }
        button { padding: 14px; width: 100%; background: #22c55e; border: none; color: white; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 10px; }
        button:disabled { background: #444; }
        #message { margin-top: 20px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>THE LOST BEACON</h2>
    <p>Définissez votre nouveau mot de passe</p>

    <input type="password" id="p1" placeholder="Nouveau mot de passe">
    <input type="password" id="p2" placeholder="Confirmer le mot de passe">

    <button id="btn" onclick="sendReset()">CHANGER LE MOT DE PASSE</button>

    <div id="message"></div>
</div>

<script>
const TID = "104EA2";

async function sendReset() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const pass1 = document.getElementById("p1").value;
    const pass2 = document.getElementById("p2").value;
    const msg = document.getElementById("message");
    const btn = document.getElementById("btn");

    if (!token) { msg.innerHTML = "❌ Erreur : Token manquant dans le mail."; msg.style.color = "red"; return; }
    if (pass1.length < 6) { msg.innerHTML = "❌ Trop court (min 6 car.)."; return; }
    if (pass1 !== pass2) { msg.innerHTML = "❌ Les mots de passe sont différents."; return; }

    btn.disabled = true;
    msg.innerHTML = "⏳ Connexion en cours...";
    msg.style.color = "cyan";

    try {
        // Envoi direct sans bibliothèque pour éviter les blocages
        const response = await fetch(`https://${TID.toLowerCase()}.playfabapi.com/Client/ResetPassword`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ TitleId: TID, Token: token, Password: pass1 })
        });

        const data = await response.json();

        if (data.code === 200) {
            msg.innerHTML = "✅ SUCCÈS ! Mot de passe modifié.<br>Vous pouvez retourner au jeu.";
            msg.style.color = "#4ade80";
            document.querySelector('.card').style.borderColor = "#22c55e";
        } else {
            msg.innerHTML = "❌ ERREUR : " + (data.errorMessage || "Lien expiré");
            msg.style.color = "#f87171";
            btn.disabled = false;
        }
    } catch (err) {
        msg.innerHTML = "❌ Erreur réseau. Vérifiez votre connexion.";
        btn.disabled = false;
    }
}
</script>
</body>
</html>
