<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lost Beacon - Reset</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050505; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; border: 2px solid #ffaa00; border-radius: 12px; padding: 40px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        h2 { color: #ffaa00; text-transform: uppercase; margin-bottom: 30px; letter-spacing: 2px; }
        .user { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        input { padding: 14px; width: 100%; box-sizing: border-box; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; font-size: 16px; outline: none; }
        input:focus { border-color: #ffaa00; }
        button { padding: 16px; width: 100%; background: #ffaa00; border: none; color: #000; font-weight: bold; border-radius: 8px; margin-top: 20px; cursor: pointer; text-transform: uppercase; width: 100%; }
        #status { margin-top: 25px; font-weight: bold; font-size: 15px; padding: 15px; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>The Lost Beacon</h2>
        <div id="greeting" class="user">Bonjour !</div>
        <div id="form-ui">
            <p style="font-size: 14px; color: #888;">Nouveau mot de passe (6 car. min) :</p>
            <input type="password" id="p1" placeholder="Mot de passe">
            <input type="password" id="p2" placeholder="Confirmer">
            <button onclick="send()">MODIFIER MON COMPTE</button>
        </div>
        <div id="status" style="display:none;"></div>
    </div>

<script>
    const TID = "104EA2";
    const params = new URLSearchParams(window.location.search);
    const u = params.get("u");
    const t = params.get("token");

    // Affichage immédiat du pseudo
    if (u) document.getElementById("greeting").innerText = "Bonjour " + decodeURIComponent(u) + " !";

    function send() {
        const p1 = document.getElementById("p1").value;
        const p2 = document.getElementById("p2").value;
        const status = document.getElementById("status");

        if (!t) { alert("Token manquant. Utilisez le lien du mail."); return; }
        if (p1 !== p2 || p1.length < 6) { alert("Vérifiez la saisie."); return; }

        status.style.display = "block";
        status.style.background = "#222";
        status.innerHTML = "⏳ Connexion à PlayFab...";

        const xhr = new XMLHttpRequest();
        // L'API exacte est Client/ResetPassword
        xhr.open("POST", "https://" + TID.toLowerCase() + ".playfabapi.com/Client/ResetPassword", true);
        xhr.setRequestHeader("Content-Type", "application/json");

        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                const res = JSON.parse(xhr.responseText);
                if (xhr.status === 200 && res.code === 200) {
                    document.getElementById("form-ui").style.display = "none";
                    status.style.background = "#064e3b";
                    status.style.color = "#4ade80";
                    status.innerHTML = "✅ SUCCÈS !<br>Votre mot de passe a été modifié.";
                } else {
                    status.style.background = "#7f1d1d";
                    status.style.color = "#f87171";
                    status.innerHTML = "❌ ERREUR : " + (res.errorMessage || "Lien expiré");
                }
            }
        };
        xhr.send(JSON.stringify({ TitleId: TID, Token: t, Password: p1 }));
    }
</script>
</body>
</html>
