<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>The Lost Beacon - Password Reset</title>
<style>
    body { font-family: sans-serif; background: #050505; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin:0; }
    .card { background:#111; border:2px solid #ffaa00; border-radius:12px; padding:30px; max-width:380px; width:90%; text-align:center; box-shadow: 0 0 30px #000; }
    input { padding:12px; width:100%; box-sizing: border-box; margin:10px 0; border-radius: 6px; border:1px solid #333; background:#000; color:#fff; font-size:16px; }
    button { padding:15px; background:#ffaa00; border:none; color:#000; font-weight:bold; border-radius:6px; width:100%; cursor:pointer; text-transform:uppercase; }
    button:disabled { background:#444; }
    #status { margin-top:20px; padding:10px; border-radius:5px; font-weight:bold; font-size:14px; }
</style>
</head>
<body>

<div class="card">
    <h2 style="color:#ffaa00">THE LOST BEACON</h2>
    <div id="ui">
        <p>Entrez votre nouveau mot de passe :</p>
        <input type="password" id="p1" placeholder="Mot de passe (min 6)">
        <input type="password" id="p2" placeholder="Confirmer le mot de passe">
        <button id="btn" onclick="send()">VALIDER LE CHANGEMENT</button>
    </div>
    <div id="status"></div>
</div>

<script>
async function send() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const p1 = document.getElementById("p1").value;
    const p2 = document.getElementById("p2").value;
    const btn = document.getElementById("btn");
    const status = document.getElementById("status");

    if(!token) {
        status.innerHTML="❌ Erreur : Token manquant. Utilisez le lien du mail.";
        status.style.color="red";
        return;
    }

    if(p1!==p2 || p1.length < 6) {
        alert("Les mots de passe ne correspondent pas ou sont trop courts.");
        return;
    }

    btn.disabled = true;
    status.innerHTML = "⏳ Connexion à PlayFab...";
    status.style.color = "cyan";

    try {
        const response = await fetch("https://104EA2.playfabapi.com/Client/ResetPassword", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                TitleId: "104EA2", 
                Token: token, 
                Password: p1 
            })
        });

        const data = await response.json();

        if(data.code === 200) {
            document.getElementById("ui").style.display = "none";
            status.innerHTML = "✅ SUCCÈS !<br>Mot de passe modifié.<br>Vous pouvez retourner au jeu.";
            status.style.color = "#00ff00";
        } else {
            status.innerHTML = "❌ ERREUR : " + (data.errorMessage || "Lien expiré");
            status.style.color = "red";
            btn.disabled = false;
        }
    } catch(e) {
        status.innerHTML = "❌ Erreur réseau.<br>Veuillez essayer sur votre TÉLÉPHONE (4G).";
        status.style.color = "orange";
        btn.disabled = false;
    }
}
</script>
</body>
</html>
