<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>The Lost Beacon - Reset</title>
    <script src="https://download.playfab.com/PlayFabClientApi.js"></script>
    <style>
        body { font-family: sans-serif; background: #050505; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; border: 2px solid #ffaa00; border-radius: 12px; padding: 40px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 10px 40px #000; }
        h2 { color: #ffaa00; text-transform: uppercase; margin-bottom: 20px; }
        input { padding: 14px; width: 100%; box-sizing: border-box; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #000; color: #fff; font-size: 16px; }
        button { padding: 16px; width: 100%; background: #ffaa00; border: none; color: #000; font-weight: bold; border-radius: 8px; margin-top: 15px; cursor: pointer; }
        #status { margin-top: 25px; font-weight: bold; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="card">
        <h2>The Lost Beacon</h2>
        <div id="form">
            <p>Entrez votre nouveau mot de passe (6 car. min) :</p>
            <input type="password" id="p1" placeholder="Nouveau mot de passe">
            <input type="password" id="p2" placeholder="Confirmer">
            <button id="btn" onclick="exec()">VALIDER</button>
        </div>
        <div id="status"></div>
    </div>

<script>
PlayFab.settings.titleId = "104EA2";

function exec() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const p1 = document.getElementById("p1").value;
    const p2 = document.getElementById("p2").value;
    const btn = document.getElementById("btn");
    const status = document.getElementById("status");

    if (!token) { status.innerHTML = "❌ Token manquant dans l'URL."; return; }
    if (p1.length < 6 || p1 !== p2) { status.innerHTML = "❌ Vérifiez la saisie."; return; }

    btn.disabled = true;
    status.innerHTML = "⏳ Connexion à PlayFab...";

    // UTILISATION DE L'API OFFICIELLE DE LA DOC
    PlayFabClientAPI.ResetPassword({
        Token: token,
        Password: p1
    }, function(result, error) {
        if (result) {
            document.getElementById("form").style.display = "none";
            status.innerHTML = "✅ SUCCÈS !<br>Mot de passe modifié.<br>Vous pouvez retourner au jeu.";
            status.style.color = "#00ff00";
        } else {
            btn.disabled = false;
            status.innerHTML = "❌ ERREUR : " + (error ? error.errorMessage : "Lien expiré");
            status.style.color = "red";
        }
    });
}
</script>
</body>
</html>
