<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation - The Lost Beacon</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; border: 2px solid #ffaa00; border-radius: 12px; padding: 35px; max-width: 380px; width: 90%; text-align: center; }
        h2 { color: #ffaa00; text-transform: uppercase; margin-bottom: 20px; }
        .user { font-size: 20px; font-weight: bold; margin-bottom: 20px; }
        input { padding: 14px; width: 100%; box-sizing: border-box; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #000; color: #fff; font-size: 16px; }
        button { padding: 16px; width: 100%; background: #ffaa00; border: none; color: #000; font-weight: bold; border-radius: 6px; margin-top: 15px; cursor: pointer; text-transform: uppercase; }
        #status { margin-top: 25px; font-weight: bold; font-size: 14px; padding: 10px; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>The Lost Beacon</h2>
        <div id="greeting" class="user">Bonjour !</div>
        <div id="form-ui">
            <input type="password" id="p1" placeholder="Nouveau mot de passe">
            <input type="password" id="p2" placeholder="Confirmer le mot de passe">
            <button onclick="submitReset()">Changer le mot de passe</button>
        </div>
        <div id="status"></div>
    </div>

<script>
    const TID = "104EA2";

    // Affichage immédiat du nom
    const params = new URLSearchParams(window.location.search);
    const user = params.get("u");
    if (user) document.getElementById("greeting").innerText = "Bonjour " + decodeURIComponent(user) + " !";

    function submitReset() {
        const token = params.get("token");
        const p1 = document.getElementById("p1").value;
        const p2 = document.getElementById("p2").value;
        const status = document.getElementById("status");

        if (p1 !== p2 || p1.length < 6) {
            status.innerHTML = "❌ Mots de passe non valides.";
            status.style.color = "orange";
            return;
        }

        status.innerHTML = "⏳ Connexion au serveur...";
        status.style.color = "#fff";

        const xhr = new XMLHttpRequest();
        xhr.open("POST", "https://" + TID + ".playfabapi.com/Client/ResetPassword", true);
        xhr.setRequestHeader("Content-Type", "application/json");

        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                const res = JSON.parse(xhr.responseText);
                if (xhr.status === 200 && res.code === 200) {
                    document.getElementById("form-ui").style.display = "none";
                    status.innerHTML = "✅ SUCCÈS !<br>Votre mot de passe a été modifié.";
                    status.style.color = "#00ff00";
                    status.style.background = "#064e3b";
                } else {
                    status.innerHTML = "❌ ERREUR : " + (res.errorMessage || "Lien expiré");
                    status.style.color = "#ff4444";
                }
            }
        };
        
        xhr.send(JSON.stringify({ TitleId: TID, Token: token, Password: p1 }));
    }
</script>
</body>
</html>
