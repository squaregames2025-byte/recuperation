<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>The Lost Beacon - Reset</title>
    <style>
        body { font-family: sans-serif; background: #050505; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; border: 2px solid #ffaa00; border-radius: 12px; padding: 40px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 0 50px rgba(255,170,0,0.1); }
        h2 { color: #ffaa00; text-transform: uppercase; margin-bottom: 20px; }
        input { padding: 14px; width: 100%; box-sizing: border-box; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #000; color: #fff; font-size: 16px; outline: none; }
        button { padding: 16px; width: 100%; background: #ffaa00; border: none; color: #000; font-weight: bold; border-radius: 8px; margin-top: 20px; cursor: pointer; text-transform: uppercase; }
        #status { margin-top: 25px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>The Lost Beacon</h2>
        <div id="form">
            <p>Entrez votre nouveau mot de passe :</p>
            <input type="password" id="p1" placeholder="Nouveau mot de passe">
            <input type="password" id="p2" placeholder="Confirmer">
            <button id="btn" onclick="send()">VALIDER LE CHANGEMENT</button>
        </div>
        <div id="status"></div>
    </div>

<script>
async function send() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token"); // PlayFab l'ajoute tout seul après le redirect !
    const p1 = document.getElementById("p1").value;
    const p2 = document.getElementById("p2").value;
    const status = document.getElementById("status");

    if (!token) { status.innerHTML = "❌ Erreur : Lien incomplet (token manquant)."; return; }
    if (p1 !== p2 || p1.length < 6) { status.innerHTML = "❌ Vérifiez la saisie (min 6 car.)."; return; }

    status.innerHTML = "⏳ Connexion à PlayFab...";

    try {
        const response = await fetch("https://104EA2.playfabapi.com/Client/ResetPassword", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ TitleId: "104EA2", Token: token, Password: p1 })
        });

        const data = await response.json();

        if (data.code === 200) {
            document.getElementById("form").style.display = "none";
            status.innerHTML = "✅ SUCCÈS !<br>Mot de passe modifié. Retournez au jeu.";
            status.style.color = "#00ff00";
        } else {
            status.innerHTML = "❌ ERREUR : " + (data.errorMessage || "Lien expiré");
            status.style.color = "red";
        }
    } catch (e) {
        status.innerHTML = "❌ Erreur réseau.<br>Essayez sur votre TÉLÉPHONE (4G/5G).";
    }
}
</script>
</body>
</html>
