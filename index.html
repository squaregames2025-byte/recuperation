<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>The Lost Beacon - Récupération</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; border: 2px solid #ffaa00; border-radius: 12px; padding: 30px; max-width: 380px; width: 90%; text-align: center; }
        input { padding: 12px; width: 100%; box-sizing: border-box; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #000; color: #fff; font-size: 16px; }
        button { padding: 15px; background: #ffaa00; border: none; color: #000; font-weight: bold; border-radius: 6px; width: 100%; cursor: pointer; text-transform: uppercase; }
        button:disabled { background: #444; cursor: not-allowed; }
        #status { margin-top: 20px; font-weight: bold; font-size: 14px; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#ffaa00">THE LOST BEACON</h2>
        <div id="ui">
            <p>Nouveau mot de passe (6 car. min) :</p>
            <input type="password" id="p1" placeholder="Mot de passe">
            <input type="password" id="p2" placeholder="Confirmer">
            <button id="btn" onclick="send()">VALIDER</button>
        </div>
        <div id="status"></div>
    </div>

<script>
async function send() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const p1 = document.getElementById("p1").value;
    const p2 = document.getElementById("p2").value;
    const btn = document.getElementById("btn");
    const status = document.getElementById("status");

    if (p1 !== p2 || p1.length < 6) { alert("Erreur de saisie"); return; }

    btn.disabled = true;
    status.style.background = "#222";
    status.innerHTML = "⏳ Envoi en cours...";

    try {
        const response = await fetch("https://104EA2.playfabapi.com/Client/ResetPassword", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                TitleId: "104EA2",
                Token: token,
                Password: p1
            })
        });

        const data = await response.json();

        if (data.code === 200) {
            document.getElementById("ui").style.display = "none";
            status.style.background = "#064e3b";
            status.innerHTML = "✅ SUCCÈS !<br>Mot de passe modifié. Retournez au jeu.";
        } else {
            status.style.background = "#7f1d1d";
            status.innerHTML = "❌ ERREUR : " + (data.errorMessage || "Lien expiré");
            btn.disabled = false;
        }
    } catch (e) {
        status.style.background = "#7c2d12";
        status.innerHTML = "❌ BLOCAGE RÉSEAU.<br><br>Testez sur votre <b>TÉLÉPHONE en 4G</b> (sans Wifi).";
        btn.disabled = false;
    }
}
</script>
</body>
</html>
