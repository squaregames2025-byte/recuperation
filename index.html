<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>The Lost Beacon - Reset</title>
    <style>
        body { font-family: sans-serif; background: #050505; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; border: 2px solid #ffaa00; border-radius: 12px; padding: 40px; max-width: 400px; width: 90%; text-align: center; }
        h2 { color: #ffaa00; text-transform: uppercase; margin-top: 0; }
        input { padding: 14px; width: 100%; box-sizing: border-box; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #000; color: #fff; font-size: 16px; outline: none; }
        button { padding: 16px; width: 100%; background: #ffaa00; border: none; color: #000; font-weight: bold; border-radius: 8px; margin-top: 15px; cursor: pointer; }
        #status { margin-top: 25px; font-weight: bold; font-size: 14px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="card">
        <h2>The Lost Beacon</h2>
        <div id="greeting" style="font-size: 20px; margin-bottom: 20px;">Bonjour !</div>
        <input type="password" id="p1" placeholder="Nouveau mot de passe">
        <input type="password" id="p2" placeholder="Confirmer le mot de passe">
        <button id="btn" onclick="send()">MODIFIER MON MOT DE PASSE</button>
        <div id="status"></div>
    </div>

<script>
async function send() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const u = params.get("u");
    const p1 = document.getElementById("p1").value;
    const p2 = document.getElementById("p2").value;
    const status = document.getElementById("status");

    if (u) document.getElementById("greeting").innerHTML = "Bonjour " + decodeURIComponent(u) + " !";
    if (p1 !== p2 || p1.length < 6) { status.innerHTML = "❌ Erreur de saisie."; return; }

    status.innerHTML = "⏳ Envoi...";
    
    try {
        // ON UTILISE LE TITLE ID EN MAJUSCULES DANS L'URL
        const url = "https://104EA2.playfabapi.com/Client/ResetPassword";
        
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ TitleId: "104EA2", Token: token, Password: p1 })
        });

        const data = await response.json();

        if (response.ok && data.code === 200) {
            status.innerHTML = "✅ SUCCÈS ! Mot de passe modifié.";
            status.style.color = "#00ff00";
        } else {
            // AFFICHE L'ERREUR RÉELLE DU SERVEUR
            status.innerHTML = "❌ ERREUR SERVEUR : " + (data.errorMessage || "Lien expiré");
            status.style.color = "red";
        }
    } catch (err) {
        // AFFICHE L'ERREUR RÉELLE DU NAVIGATEUR
        status.innerHTML = "❌ ERREUR TECHNIQUE : " + err.message;
        status.style.color = "orange";
    }
}
</script>
</body>
</html>
