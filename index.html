<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>The Lost Beacon - Password Reset</title>
    <style>
        body { font-family: sans-serif; background: #050505; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; border: 2px solid #ffaa00; border-radius: 12px; padding: 40px; max-width: 400px; width: 90%; text-align: center; }
        h2 { color: #ffaa00; text-transform: uppercase; margin-bottom: 20px; }
        input { padding: 14px; width: 100%; box-sizing: border-box; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #000; color: #fff; font-size: 16px; }
        button { padding: 16px; width: 100%; background: #ffaa00; border: none; color: #000; font-weight: bold; border-radius: 8px; margin-top: 20px; cursor: pointer; }
        #status { margin-top: 25px; font-weight: bold; font-size: 15px; padding: 15px; border-radius: 6px; display: none; }
        .debug-text { font-size: 12px; font-weight: normal; color: #aaa; margin-top: 10px; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h2>The Lost Beacon</h2>
        <div id="ui">
            <p>Définissez votre nouveau mot de passe :</p>
            <input type="password" id="p1" placeholder="Nouveau mot de passe">
            <input type="password" id="p2" placeholder="Confirmer le mot de passe">
            <button onclick="realReset()">VALIDER LE CHANGEMENT</button>
        </div>
        <div id="status"></div>
    </div>

<script>
    async function realReset() {
        const TID = "104EA2";
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");
        const p1 = document.getElementById("p1").value;
        const p2 = document.getElementById("p2").value;
        const status = document.getElementById("status");

        if (!token) { 
            alert("Lien invalide ou expiré."); 
            return; 
        }
        if (p1 !== p2 || p1.length < 6) { 
            alert("Vérifiez vos mots de passe (minimum 6 caractères et ils doivent être identiques)."); 
            return; 
        }

        status.style.display = "block";
        status.innerHTML = "⏳ Connexion à PlayFab...";
        status.style.color = "#ffaa00";

        try {
            console.log("Envoi de la requête à PlayFab...");
            const response = await fetch(`https://${TID}.playfabapi.com/Client/ResetPassword`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({
                    Token: token,
                    Password: p1
                })
            });

            console.log("Réponse reçue, traitement...");
            const data = await response.json();

            if (data.code === 200) {
                document.getElementById("ui").style.display = "none";
                status.innerHTML = "✅ SUCCÈS !<br>Votre mot de passe a été modifié.";
                status.style.color = "#00ff00";
            } else {
                status.innerHTML = "❌ ERREUR PLAYFAB : <br>" + (data.errorMessage || "Lien invalide ou expiré.");
                status.style.color = "red";
            }
        } catch (e) {
            console.error("Détail de l'erreur réseau :", e);
            status.innerHTML = `❌ ERREUR RÉSEAU<br>
                <span class="debug-text">Détail technique : ${e.message}</span>
                <span class="debug-text" style="color:#ffaa00;">💡 Solution : Désactivez votre bloqueur de pub (AdBlock, uBlock) ou essayez en navigation privée. Le navigateur bloque la connexion aux serveurs du jeu.</span>`;
            status.style.color = "red";
        }
    }
</script>
</body>
</html>
