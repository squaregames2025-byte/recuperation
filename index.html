<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lost Beacon - Recovery</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 40px; border-radius: 15px; border: 2px solid #ffaa00; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        h2 { color: #ffaa00; text-transform: uppercase; margin: 0 0 10px 0; }
        input { padding: 14px; margin: 10px 0; width: 100%; box-sizing: border-box; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 16px; outline: none; }
        input:focus { border-color: #ffaa00; }
        button { padding: 16px; width: 100%; background: #22c55e; border: none; color: white; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        button:disabled { background: #444; cursor: not-allowed; }
        #status { margin-top: 20px; font-weight: bold; font-size: 15px; }
        /* Console de debug pour le test */
        #debug { margin-top: 20px; padding: 10px; background: #000; color: #555; font-family: monospace; font-size: 10px; text-align: left; border-radius: 5px; max-height: 80px; overflow-y: auto; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="card">
    <h2>THE LOST BEACON</h2>
    <p style="color: #94a3b8; font-size: 14px;">Réinitialisation du mot de passe</p>

    <input type="password" id="p1" placeholder="Nouveau mot de passe">
    <input type="password" id="p2" placeholder="Confirmer le mot de passe">

    <button id="submitBtn" onclick="doReset()">CHANGER LE MOT DE PASSE</button>

    <div id="status"></div>
    <div id="debug">Console système :<br></div>
</div>

<script>
const TID = "104EA2";

function log(msg) {
    const d = document.getElementById("debug");
    d.innerHTML += "> " + msg + "<br>";
    d.scrollTop = d.scrollHeight;
}

async function doReset() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const p1 = document.getElementById("p1").value;
    const p2 = document.getElementById("p2").value;
    const btn = document.getElementById("submitBtn");
    const status = document.getElementById("status");

    if (!token) { log("Erreur: Token absent de l'URL"); status.innerHTML = "❌ Lien invalide."; return; }
    if (p1.length < 6 || p1 !== p2) { log("Erreur: Validation MDP échouée"); status.innerHTML = "❌ Vérifiez vos mots de passe."; return; }

    btn.disabled = true;
    status.innerHTML = "⏳ Connexion...";
    log("Envoi de la requête vers PlayFab...");

    try {
        // APPEL DIRECT NATIVE FETCH (Plus robuste que le SDK pour GitHub)
        const response = await fetch(`https://${TID.toLowerCase()}.playfabapi.com/Client/ResetPassword`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                TitleId: TID,
                Token: token,
                Password: p1
            })
        });

        log("Réponse reçue du serveur (HTTP " + response.status + ")");
        
        const data = await response.json();

        if (response.ok && data.code === 200) {
            log("Succès PlayFab confirmé.");
            status.innerHTML = "✅ SUCCÈS !<br>Mot de passe modifié.<br>Retournez au jeu.";
            status.style.color = "#4ade80";
            btn.style.display = "none";
        } else {
            const errorMsg = data.errorMessage || "Lien expiré.";
            log("Erreur API : " + errorMsg);
            status.innerHTML = "❌ ÉCHEC : " + errorMsg;
            btn.disabled = false;
        }
    } catch (err) {
        log("CRASH RÉSEAU : Le navigateur bloque la requête.");
        status.innerHTML = "❌ Erreur réseau.<br>Ouvrez ce lien en <b>Navigation Privée</b>.";
        btn.disabled = false;
    }
}

log("Page prête. Token détecté : " + (new URLSearchParams(window.location.search).get("token") ? "OUI" : "NON"));
</script>
</body>
</html>
