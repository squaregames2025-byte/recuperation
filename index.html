<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password - The Lost Beacon</title>

<style>
body {
  font-family: Arial;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.card {
  background:#111;
  border:2px solid #ffaa00;
  border-radius:12px;
  padding:40px;
  max-width:350px;
  width:90%;
  text-align:center;
}

h2 {
  color:#ffaa00;
}

input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #333;
  background:#000;
  color:#fff;
}

button {
  width:100%;
  padding:15px;
  background:#ffaa00;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

#status {
  margin-top:20px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="card">
  <h2>The Lost Beacon</h2>

  <p>Enter your new password</p>

  <input type="password" id="p1" placeholder="New password (min 6)">
  <input type="password" id="p2" placeholder="Confirm password">

  <button onclick="resetPassword()">RESET</button>

  <div id="status"></div>
</div>

<script>
async function resetPassword() {

  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  const p1 = document.getElementById("p1").value;
  const p2 = document.getElementById("p2").value;
  const status = document.getElementById("status");

  if (!token) {
    status.innerText = "Invalid or missing token.";
    return;
  }

  if (p1.length < 6) {
    status.innerText = "Password must be at least 6 characters.";
    return;
  }

  if (p1 !== p2) {
    status.innerText = "Passwords do not match.";
    return;
  }

  status.innerText = "Processing...";

  try {
    const response = await fetch("https://YOUR_TITLE_ID.playfabapi.com/Client/ResetPassword", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        Token: token,
        Password: p1
      })
    });

    const data = await response.json();

    if (data.code === 200) {
      status.innerText = "✅ Password successfully reset!";
    } else {
      status.innerText = "❌ Error: " + data.errorMessage;
    }

  } catch (err) {
    status.innerText = "❌ Network error.";
  }
}
</script>

</body>
</html>
