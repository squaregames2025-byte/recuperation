<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>The Lost Beacon - Password Reset</title>
    <style>
        body { font-family: sans-serif; background: #050505; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; border: 2px solid #ffaa00; border-radius: 12px; padding: 40px; max-width: 400px; width: 90%; text-align: center; }
        h2 { color: #ffaa00; text-transform: uppercase; margin-bottom: 20px; }
        input { padding: 14px; width: 100%; box-sizing: border-box; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #000; color: #fff; font-size: 16px; }
        button { padding: 16px; width: 100%; background: #ffaa00; border: none; color: #000; font-weight: bold; border-radius: 8px; margin-top: 20px; cursor: pointer; }
        #status { margin-top: 25px; font-weight: bold; font-size: 15px; padding: 15px; border-radius: 6px; display: none; }
        .debug-text { font-size: 10px; color: #777; margin-top: 15px; display: block; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>The Lost Beacon</h2>
        <div id="ui">
            <p>Définissez votre nouveau mot de passe :</p>
            <input type="password" id="p1" placeholder="Nouveau mot de passe">
            <input type="password" id="p2" placeholder="Confirmer le mot de passe">
            <button onclick="realReset()">VALIDER LE CHANGEMENT</button>
        </div>
        <div id="status"></div>
        <div id="debug" class="debug-text"></div>
    </div>

<script>
    async function realReset() {
        const TID = "104EA2".trim().toLowerCase(); // PlayFab utilise souvent des minuscules pour les sous-domaines
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");
        const p1 = document.getElementById("p1").value;
        const p2 = document.getElementById("p2").value;
        const status = document.getElementById("status");
        const debug = document.getElementById("debug");

        if (!token) { alert("Erreur : Token absent de l'URL."); return; }
        if (p1 !== p2 || p1.length < 6) { alert("Les mots de passe doivent être identiques et faire au moins 6 caractères."); return; }

        status.style.display = "block";
        status.style.color = "#ffaa00";
        status.innerHTML = "⏳ Communication avec PlayFab...";
        debug.innerHTML = "";

        const apiUrl = `https://${TID}.playfabapi.com/Client/ResetPassword`;

        try {
            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    TitleId: TID.toUpperCase(),
                    Token: token,
                    Password: p1
                })
            });

            // On vérifie si la réponse est vide ou n'est pas du JSON
            const contentType = response.headers.get("content-type");
            if (!contentType || !contentType.includes("application/json")) {
                const errorText = await response.text();
                throw new Error(`Réponse non-JSON du serveur (Code ${response.status}). Le serveur a renvoyé : ${errorText.substring(0, 50)}...`);
            }

            const data = await response.json();

            if (data.code === 200) {
                document.getElementById("ui").style.display = "none";
                status.innerHTML = "✅ SUCCÈS !<br>Votre mot de passe a été réinitialisé.";
                status.style.color = "#00ff00";
            } else {
                status.innerHTML = "❌ ERREUR PLAYFAB : " + (data.errorMessage || "Lien expiré ou invalide.");
                status.style.color = "red";
            }

        } catch (e) {
            status.innerHTML = "❌ ERREUR TECHNIQUE";
            status.style.color = "red";
            debug.innerHTML = "Détail : " + e.message + "<br>Vérifiez que votre TitleID '" + TID + "' est correct.";
            console.error(e);
        }
    }
</script>
</body>
</html>
