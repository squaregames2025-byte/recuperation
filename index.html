<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>The Lost Beacon - Secure Reset</title>
    <script src="https://download.playfab.com/PlayFabClientApi.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; border: 2px solid #ffaa00; border-radius: 12px; padding: 40px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 0 50px #000; }
        h2 { color: #ffaa00; text-transform: uppercase; margin-bottom: 25px; }
        input { padding: 14px; width: 100%; box-sizing: border-box; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #000; color: #fff; font-size: 16px; outline: none; }
        button { padding: 16px; width: 100%; background: #ffaa00; border: none; color: #000; font-weight: bold; border-radius: 8px; margin-top: 20px; cursor: pointer; width: 100%; text-transform: uppercase; }
        #status { margin-top: 25px; font-weight: bold; font-size: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>The Lost Beacon</h2>
        <div id="ui">
            <p id="greet">Réinitialisation du compte</p>
            <input type="password" id="p1" placeholder="Nouveau mot de passe">
            <input type="password" id="p2" placeholder="Confirmer le mot de passe">
            <button onclick="connectAndReset()">CHANGER MON MOT DE PASSE</button>
        </div>
        <div id="status"></div>
    </div>

<script>
    PlayFab.settings.titleId = "104EA2";
    const params = new URLSearchParams(window.location.search);
    const u = params.get("u");
    if (u) document.getElementById("greet").innerText = "Bonjour " + decodeURIComponent(u) + " !";

    function connectAndReset() {
        const token = params.get("token");
        const p1 = document.getElementById("p1").value;
        const p2 = document.getElementById("p2").value;
        const status = document.getElementById("status");

        if (!token) { alert("Lien invalide."); return; }
        if (p1 !== p2 || p1.length < 6) { alert("Vérifiez la saisie."); return; }

        status.innerHTML = "⏳ Connexion sécurisée à PlayFab...";
        status.style.color = "#fff";

        // --- LA VRAIE CONNEXION VIA CLOUDSCRIPT ---
        PlayFabClientAPI.ExecuteCloudScript({
            FunctionName: "ProResetPassword",
            FunctionParameter: { Token: token, Password: p1 }
        }, function(result, error) {
            if (result && result.data.FunctionResult && result.data.FunctionResult.success) {
                document.getElementById("ui").style.display = "none";
                status.innerHTML = "✅ SUCCÈS !<br>Votre mot de passe a été modifié.";
                status.style.color = "#00ff00";
            } else {
                let msg = "Lien expiré ou erreur serveur.";
                if (result && result.data.FunctionResult && result.data.FunctionResult.error) msg = result.data.FunctionResult.error;
                status.innerHTML = "❌ ÉCHEC : " + msg;
                status.style.color = "red";
            }
        });
    }
</script>
</body>
</html>
