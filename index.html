<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>The Lost Beacon - Reset</title>
    <style>
        body { font-family: sans-serif; background: #050505; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; border: 2px solid #ffaa00; border-radius: 12px; padding: 40px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        h2 { color: #ffaa00; text-transform: uppercase; margin-bottom: 20px; }
        input { padding: 14px; width: 100%; box-sizing: border-box; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; font-size: 16px; outline: none; }
        button { padding: 16px; width: 100%; background: #ffaa00; border: none; color: #000; font-weight: bold; border-radius: 8px; margin-top: 20px; cursor: pointer; width: 100%; }
        #status { margin-top: 25px; font-weight: bold; font-size: 15px; padding: 15px; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>The Lost Beacon</h2>
        <div id="greeting" style="font-size: 20px; margin-bottom: 20px;">Bonjour !</div>
        <div id="ui">
            <input type="password" id="p1" placeholder="Nouveau mot de passe">
            <input type="password" id="p2" placeholder="Confirmer">
            <button onclick="send()">VALIDER</button>
        </div>
        <div id="status" style="display:none"></div>
    </div>
<script>
    const TID = "104EA2";
    const params = new URLSearchParams(window.location.search);
    const u = params.get("u");
    const t = params.get("token");

    if (u) document.getElementById("greeting").innerText = "Bonjour " + decodeURIComponent(u) + " !";

    async function send() {
        const p1 = document.getElementById("p1").value;
        const p2 = document.getElementById("p2").value;
        const status = document.getElementById("status");

        if (!t) { alert("Erreur : Token vide. Envoyez le mail DEPUIS LE JEU."); return; }
        if (p1 !== p2 || p1.length < 6) { alert("Vérifiez vos mots de passe."); return; }

        status.style.display = "block";
        status.innerHTML = "⏳ Connexion à PlayFab...";

        try {
            // L'API CORRECTE EST ResetTitlePassword
            const response = await fetch(`https://${TID.toLowerCase()}.playfabapi.com/Client/ResetTitlePassword`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ TitleId: TID, Token: t, Password: p1 })
            });
            const data = await response.json();
            if (data.code === 200) {
                document.getElementById("ui").style.display = "none";
                status.style.background = "#064e3b";
                status.style.color = "#4ade80";
                status.innerHTML = "✅ SUCCÈS !<br>Mot de passe modifié.";
            } else {
                status.style.background = "#7f1d1d";
                status.innerHTML = "❌ ERREUR : " + (data.errorMessage || "Lien expiré");
            }
        } catch (e) {
            status.innerHTML = "❌ ERREUR RÉSEAU.";
        }
    }
</script>
</body>
</html>
