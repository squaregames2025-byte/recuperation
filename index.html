<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>The Lost Beacon - Reset</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; border: 2px solid #ffaa00; border-radius: 12px; padding: 30px; max-width: 380px; width: 95%; text-align: center; }
        input { padding: 12px; width: 100%; box-sizing: border-box; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #000; color: #fff; }
        button { padding: 15px; background: #ffaa00; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; }
        #debug-info { margin-top: 20px; font-size: 11px; color: #555; background: #050505; padding: 10px; border: 1px solid #222; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#ffaa00">THE LOST BEACON</h2>
        <div id="form-ui">
            <p>Nouveau mot de passe :</p>
            <input type="password" id="p1" placeholder="Mot de passe">
            <input type="password" id="p2" placeholder="Confirmer">
            <button onclick="finalReset()">CHANGER LE MOT DE PASSE</button>
        </div>
        <div id="status" style="margin-top:20px; font-weight:bold;"></div>
        <div id="debug-info">Radar de paramètres :<br></div>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    // On cherche TOUS les noms de tokens possibles pour ne plus rien rater
    const token = params.get("token") || params.get("PasswordResetToken") || params.get("t");
    
    // On affiche tout ce qu'on trouve pour le debug
    document.getElementById("debug-info").innerHTML += "Token détecté : " + (token ? "OUI" : "NON") + "<br>";
    document.getElementById("debug-info").innerHTML += "Valeur : " + (token ? token.substring(0,10) + "..." : "VIDE");

    async function finalReset() {
        const p1 = document.getElementById("p1").value;
        const p2 = document.getElementById("p2").value;
        const status = document.getElementById("status");

        if (!token) { status.innerHTML = "❌ Token manquant. Envoyez le mail DEPUIS LE JEU."; return; }
        if (p1 !== p2 || p1.length < 6) { alert("Saisie invalide"); return; }

        status.innerHTML = "⏳ Connexion à PlayFab...";

        try {
            const response = await fetch("https://104EA2.playfabapi.com/Client/ResetPassword", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ TitleId: "104EA2", Token: token, Password: p1 })
            });
            const data = await response.json();
            if (data.code === 200) {
                document.getElementById("form-ui").style.display = "none";
                status.innerHTML = "✅ SUCCÈS ! Mot de passe modifié.";
                status.style.color = "#00ff00";
            } else {
                status.innerHTML = "❌ ERREUR : " + data.errorMessage;
                status.style.color = "red";
            }
        } catch (e) {
            status.innerHTML = "❌ ERREUR RÉSEAU.";
        }
    }
</script>
</body>
</html>
