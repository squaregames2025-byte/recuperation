<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>The Lost Beacon - Récupération</title>
<style>
body { font-family: sans-serif; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin:0; }
.card { background:#111; border:2px solid #ffaa00; border-radius:12px; padding:30px; max-width:380px; width:90%; text-align:center; }
input { padding:12px; width:100%; margin:10px 0; border-radius:6px; border:1px solid #333; background:#000; color:#fff; }
button { padding:15px; background:#ffaa00; border:none; color:#000; font-weight:bold; border-radius:6px; width:100%; cursor:pointer; }
button:disabled { background:#444; }
#status { margin-top:20px; padding:10px; border-radius:5px; font-weight:bold; }
#debug { margin-top:10px; font-size:12px; color:#888; word-break: break-all; }
</style>
</head>
<body>

<div class="card">
    <h2 style="color:#ffaa00">THE LOST BEACON</h2>
    <div id="ui">
        <p>Nouveau mot de passe :</p>
        <input type="password" id="p1" placeholder="Mot de passe">
        <input type="password" id="p2" placeholder="Confirmer">
        <button id="btn" onclick="send()">VALIDER</button>
    </div>
    <div id="status"></div>
    <div id="debug"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get("token") || params.get("t") || params.get("PasswordResetToken");
const email = params.get("email") || params.get("e");

document.getElementById("debug").innerHTML = "Token: " + (token || "NULL") + "<br>Email: " + (email || "NULL");

async function send() {
    const p1 = document.getElementById("p1").value;
    const p2 = document.getElementById("p2").value;
    const btn = document.getElementById("btn");
    const status = document.getElementById("status");

    if(!token || !email) {
        status.style.background="#7f1d1d";
        status.innerHTML="❌ Lien invalide ou expiré";
        return;
    }

    if(p1!==p2 || p1.length<6) {
        alert("Mot de passe invalide (min 6 caractères)");
        return;
    }

    btn.disabled=true;
    status.style.background="#222";
    status.innerHTML="⏳ Envoi en cours...";

    try {
        const response = await fetch("https://104EA2.playfabapi.com/Client/ConfirmPasswordReset", {
            method:"POST",
            headers: { "Content-Type":"application/json" },
            body: JSON.stringify({ TitleId:"104EA2", Email:email, Token:token, Password:p1 })
        });

        const data = await response.json();
        console.log("PlayFab:",data);

        if(data.code===200) {
            document.getElementById("ui").style.display="none";
            status.style.background="#064e3b";
            status.innerHTML="✅ Mot de passe modifié !";
            setTimeout(()=>{ window.location.href="/"; },2500);
        } else {
            status.style.background="#7f1d1d";
            status.innerHTML="❌ "+(data.errorMessage||"Erreur");
            btn.disabled=false;
        }
    } catch(e) {
        console.error(e);
        status.style.background="#7c2d12";
        status.innerHTML="❌ Problème réseau";
        btn.disabled=false;
    }
}
</script>

</body>
</html>
