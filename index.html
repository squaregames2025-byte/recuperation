<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>The Lost Beacon - Final Fix</title>
    <style>
        body { font-family: sans-serif; background: #050505; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; border: 2px solid #ffaa00; border-radius: 12px; padding: 40px; max-width: 400px; width: 90%; text-align: center; }
        h2 { color: #ffaa00; text-transform: uppercase; margin-bottom: 20px; }
        input { padding: 14px; width: 100%; box-sizing: border-box; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #000; color: #fff; font-size: 16px; outline: none; }
        button { padding: 16px; width: 100%; background: #ffaa00; border: none; color: #000; font-weight: bold; border-radius: 8px; cursor: pointer; }
        #status { margin-top: 25px; font-weight: bold; font-size: 14px; }
        #debug-log { margin-top: 20px; padding: 10px; background: #000; color: #666; font-family: monospace; font-size: 10px; text-align: left; border: 1px solid #222; }
    </style>
</head>
<body>
    <div class="card">
        <h2>The Lost Beacon</h2>
        <div id="greeting" style="margin-bottom:15px;">Bonjour !</div>
        <input type="password" id="p1" placeholder="Nouveau mot de passe">
        <input type="password" id="p2" placeholder="Confirmer">
        <button onclick="sendRequest()">VALIDER</button>
        <div id="status"></div>
        <div id="debug-log">Logs de connexion :<br></div>
    </div>

<script>
const TID = "104EA2";

function addLog(m) { document.getElementById("debug-log").innerHTML += "> " + m + "<br>"; }

async function sendRequest() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const u = params.get("u");
    const p1 = document.getElementById("p1").value;
    const status = document.getElementById("status");

    if (u) document.getElementById("greeting").innerHTML = "Bonjour " + decodeURIComponent(u) + " !";
    if (p1.length < 6) { status.innerHTML = "❌ Trop court."; return; }

    status.innerHTML = "⏳ Envoi au serveur...";
    addLog("Début de la requête...");

    try {
        // ON FORCE L'ID EN MINUSCULES DANS L'URL (Standard PlayFab)
        const url = `https://${TID.toLowerCase()}.playfabapi.com/Client/ResetPassword`;
        addLog("URL cible : " + url);

        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ TitleId: TID, Token: token, Password: p1 })
        });

        addLog("Statut HTTP : " + response.status);

        // On vérifie d'abord si la réponse a du contenu
        const text = await response.text();
        if (!text) {
            addLog("ERREUR : Le serveur a renvoyé une réponse vide.");
            status.innerHTML = "❌ Le serveur ne répond pas. Réessayez.";
            return;
        }

        const data = JSON.parse(text);

        if (response.ok && data.code === 200) {
            status.innerHTML = "✅ SUCCÈS ! Mot de passe modifié.";
            status.style.color = "#00ff00";
        } else {
            status.innerHTML = "❌ ERREUR SERVEUR : " + (data.errorMessage || "Lien invalide");
            addLog("Détail : " + (data.errorMessage || "Inconnu"));
        }
    } catch (err) {
        status.innerHTML = "❌ ERREUR TECHNIQUE : " + err.message;
        addLog("Erreur : " + err.message);
    }
}
</script>
</body>
</html>
