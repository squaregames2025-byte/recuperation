<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>The Lost Beacon - Reset</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; border: 2px solid #ffaa00; border-radius: 12px; padding: 35px; max-width: 380px; width: 95%; text-align: center; }
        h2 { color: #ffaa00; text-transform: uppercase; margin-bottom: 20px; }
        input { padding: 12px; width: 100%; box-sizing: border-box; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #000; color: #fff; font-size: 16px; }
        button { padding: 15px; background: #ffaa00; border: none; color: #000; font-weight: bold; border-radius: 6px; margin-top: 10px; cursor: pointer; width: 100%; }
        #status { margin-top: 20px; font-weight: bold; font-size: 14px; padding: 15px; border-radius: 6px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>The Lost Beacon</h2>
        <p id="greet">Bonjour !</p>
        <div id="form-ui">
            <input type="password" id="p1" placeholder="Nouveau mot de passe">
            <input type="password" id="p2" placeholder="Confirmer">
            <button onclick="sendReset()">VALIDER</button>
        </div>
        <div id="status"></div>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const user = params.get("u");
    const token = params.get("token");

    if (user) document.getElementById("greet").innerText = "Bonjour " + decodeURIComponent(user) + " !";

    async function sendReset() {
        const p1 = document.getElementById("p1").value;
        const p2 = document.getElementById("p2").value;
        const status = document.getElementById("status");

        status.style.display = "block";
        status.style.background = "#333";
        status.innerHTML = "⏳ Vérification...";

        // 1. VERIFICATION DU TOKEN (C'est là que ça bloquait)
        if (!token || token.length < 5) {
            status.style.background = "#7f1d1d";
            status.innerHTML = "❌ ERREUR : Le lien est vide.<br>N'utilisez pas 'Send Test Email'. Envoyez le mail DEPUIS LE JEU.";
            return;
        }

        if (p1 !== p2 || p1.length < 6) {
            status.innerHTML = "❌ Mots de passe non valides.";
            return;
        }

        try {
            const response = await fetch("https://104EA2.playfabapi.com/Client/ResetPassword", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ TitleId: "104EA2", Token: token, Password: p1 })
            });

            const data = await response.json();

            if (data.code === 200) {
                document.getElementById("form-ui").style.display = "none";
                status.style.background = "#064e3b";
                status.innerHTML = "✅ SUCCÈS ! Mot de passe modifié.<br>Retournez au jeu.";
            } else {
                status.style.background = "#7f1d1d";
                status.innerHTML = "❌ ERREUR PLAYFAB : " + data.errorMessage;
            }
        } catch (e) {
            status.innerHTML = "❌ ERREUR RÉSEAU : Essayez en 4G sur votre téléphone.";
        }
    }
</script>
</body>
</html>
